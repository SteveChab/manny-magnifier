<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; media-src blob: mediastream:; img-src 'self' data:;">
<link rel="icon" type="image/svg+xml" href="mmagnifier-logo.svg">
<title>mmagnifier \ High contrast magnifying glass and binoculars for your phone. Easily zoom to see labels, distant objects, and fine detail.</title>
<meta name="description" content="Turn your phone into a powerful handheld magnifying glass for easy reading. Zoom text, labels, and fine detail. Switch between high-contrast color modes. Simple, large controls. Easy to use. Good for people with low vision or dyslexia.">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --serif: 'Times New Roman', Times, Georgia, serif;
    --btn-bar-height: 72px;
    --controls-height: var(--btn-bar-height);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }

  .heading {
    z-index: 1000;
    position: fixed;
    top: 0.7rem;
    left: 0.75rem;
    line-height: 0;
    margin: 0;
  }

  .logo-icon {
    width: 36px;
    height: auto;
    display: block;
  }

  #zoom-pill {
    position: fixed;
    top: 0.7rem;
    right: 0.75rem;
    z-index: 1000;
    background: #000;
    border: 1.5px solid #fff;
    border-radius: 999px;
    padding: 5px 14px;
    color: #fff;
    font-family: var(--serif);
    font-size: 16px;
    font-weight: bold;
    line-height: 1;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── Viewfinder ── */
  #viewfinder {
    position: fixed;
    inset: 0;
    bottom: var(--controls-height);
    overflow: hidden;
    background: #000;
    isolation: isolate;
    touch-action: none;
  }

  video, #camera-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform-origin: center center;
    display: block;
    background: #000;
  }

  /* Hide the video element until the camera stream is attached.
     opacity:0 keeps autoplay/srcObject working; the play-button overlay
     never renders because it has nothing to paint over. */
  #camera { opacity: 0; }

  /* Suppress any remaining WebView media-control chrome, just in case */
  video::-webkit-media-controls,
  video::-webkit-media-controls-enclosure,
  video::-webkit-media-controls-overlay-play-button,
  video::-internal-media-controls-overlay-cast-button { display: none !important; }

  #camera-canvas { display: none; }
  #viewfinder.canvas-tier #camera-canvas { display: block; }

  #tint-overlay {
    position: absolute;
    inset: 0;
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  #no-camera {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    color: #fff;
    background: #000;
    font-family: var(--serif);
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    padding: 2rem;
    line-height: 1.5;
    cursor: pointer;
    z-index: 5;
  }
  #no-camera:active { background: #181818; }

  /* ── Controls ── */
  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--controls-height);
    z-index: 20;
  }

  #btn-bar {
    height: var(--btn-bar-height);
    display: flex;
    background: #000;
    border-top: 2px solid #fff;
  }

  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-right: 2px solid #fff;
    background: #000;
    cursor: pointer;
    padding: 10px 12px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.07s;
    overflow: hidden;
  }

  .btn:last-child { border-right: none; }
  .btn:active     { background: #181818; }

  /* Inner content wrapper — rotates to match physical orientation */
  .btn-inner {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    transition: transform 0.3s ease;
  }

  .btn-inner svg {
    width: 38px;
    height: 38px;
    display: block;
    flex-shrink: 0;
  }

  .btn-label {
    color: #fff;
    font-family: var(--serif);
    font-size: 15px;
    font-weight: bold;
    line-height: 1;
    text-align: left;
    white-space: nowrap;
  }

  /* Compact mode — used when the bar has 4 buttons (native app) */
  #btn-bar.compact .btn { padding: 8px 4px; }
  #btn-bar.compact .btn-inner {
    flex-direction: column;
    gap: 4px;
  }
  #btn-bar.compact .btn-inner svg {
    width: 28px;
    height: 28px;
  }
  #btn-bar.compact .btn-label {
    font-size: 12px;
    text-align: center;
  }

  /* Orientation rotation — works even when OS rotation lock is on.
     screen.orientation.angle reads the physical device angle, not the viewport.
     Buttons stay at the bottom; only the inner content rotates for readability.
     We also switch to column layout + compact sizing so the rotated content
     fits within the 72px button height (44px column ≪ 72px, no clipping). */
  body.orient-cw .btn-inner,
  body.orient-ccw .btn-inner {
    flex-direction: column;
    gap: 4px;
  }
  body.orient-cw .btn-inner svg,
  body.orient-ccw .btn-inner svg {
    width: 28px;
    height: 28px;
  }
  body.orient-cw .btn-label,
  body.orient-ccw .btn-label {
    font-size: 12px;
    text-align: center;
  }
  body.orient-cw  .btn-inner { transform: rotate(90deg); }   /* 270° physical */
  body.orient-ccw .btn-inner { transform: rotate(-90deg); }  /* 90° physical */
</style>
</head>

        <rect x="26.85" y="23.46" width="24.32" height="5" transform="translate(-4.62 8.86) rotate(-12.24)"/>

    </h1>
    <button id="zoom-pill" onclick="cycleZoom()" aria-label="Change zoom level">
      <span id="zoom-label">1×</span>
    </button>

<!-- Viewfinder: video + tint overlay, both inside isolation context -->
<div id="viewfinder">
  <video id="camera" autoplay playsinline muted></video>
  <canvas id="camera-canvas"></canvas>
  <div id="tint-overlay"></div>
  <div id="no-camera" onclick="requestCamera()" role="button" tabindex="0">Tap to Allow Camera</div>
</div>

<!-- Controls: 3 buttons with labels underneath -->
<div id="controls">
  <div id="btn-bar" role="toolbar" aria-label="Magnifier controls">

    <!-- Color mode cycle -->
    <button class="btn" onclick="nextMode()" aria-label="Change color mode">
      <div class="btn-inner">
        <svg id="mode-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle id="mode-circle" cx="12" cy="12" r="8.5" stroke-width="2.2"/>
        </svg>
        <span class="btn-label" id="mode-label">Color</span>
      </div>
    </button>

    <!-- Brightness cycle -->
    <button class="btn" onclick="nextBright()" aria-label="Change brightness">
      <div class="btn-inner">
        <svg id="bright-svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">

<script>
(function () {
  'use strict';

  const MODES = [
    { name: 'Color',        naturalColor: true, tint: '#ffffff', iconFill: '#00ffff', iconStroke: '#00ffff' },
    { name: 'Yellow/Black', invert: true,  tint: '#ffff00', iconFill: '#ffff00', iconStroke: '#ffff00' },
    { name: 'Black/Yellow', invert: false, tint: '#ffff00', iconFill: '#000000', iconStroke: '#ffff00' },
    { name: 'White/Black',  invert: true,  tint: '#ffffff', iconFill: '#ffffff', iconStroke: '#ffffff' },
    { name: 'Black/White',  invert: false, tint: '#ffffff', iconFill: '#000000', iconStroke: '#ffffff' },
  ];

  const BRIGHT = [
    { cont: 1.0 }, { cont: 2.0 }, { cont: 3.0 }, { cont: 4.0 },
  ];

  const DEFAULT_LEVELS = [1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5, 5.5, 6];
  const STORAGE_KEY = 'mmagnifier';

  const video       = document.getElementById('camera');
  const canvas      = document.getElementById('camera-canvas');
  const ctx         = canvas.getContext('2d');
  const viewfinder  = document.getElementById('viewfinder');
  const noCamera    = document.getElementById('no-camera');
  const tintOverlay = document.getElementById('tint-overlay');
  const modeLabel   = document.getElementById('mode-label');
  const zoomLabel   = document.getElementById('zoom-label');
  const brightLabel = document.getElementById('bright-label');
  const modeCircle  = document.getElementById('mode-circle');

  const state = { modeIndex: 0, brightIndex: 0, zoom: 1 };
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (Number.isInteger(saved.modeIndex) && saved.modeIndex >= 0 && saved.modeIndex < MODES.length) state.modeIndex = saved.modeIndex;
    if (Number.isInteger(saved.brightIndex) && saved.brightIndex >= 0 && saved.brightIndex < BRIGHT.length) state.brightIndex = saved.brightIndex;
    if (typeof saved.zoom === 'number' && saved.zoom >= 1) state.zoom = saved.zoom;
  } catch (_) {}

  // Debounced save — coalesces rapid writes (e.g. pinch-zoom at 60fps)
  // so localStorage is written at most once per 300ms of inactivity.
  let saveTimer;
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
    }, 300);
  }

  let zoomLevels = DEFAULT_LEVELS.slice();
  let maxZoom = 6;
  let zoomMode = null;   // null until camera starts, then 'canvas'
  let track = null;
  let zoomCaps = null;
  let supportsPOI = false;
  let streamW = 0, streamH = 0;
  let focusRevertTimer = null;
  let frozen = false;

  let cameraStarted = false;

  window.requestCamera = function () {
    // Stop any existing stream before requesting a new one.
    // Prevents orphaned tracks keeping the camera indicator lit.
    if (track) { try { track.stop(); } catch (_) {} track = null; }
    if (video.srcObject) {
      try { video.srcObject.getTracks().forEach(t => t.stop()); } catch (_) {}
      video.srcObject = null;
    }

    noCamera.style.display = 'none';
    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 3840 },
        height: { ideal: 2160 },
        focusMode: { ideal: 'continuous' },
      },
      audio: false,
    })
    .then(stream => {
      video.srcObject = stream;
      track = stream.getVideoTracks()[0];

      const caps = (track.getCapabilities && track.getCapabilities()) || {};
      const settings = (track.getSettings && track.getSettings()) || {};
      streamW = settings.width  || 1920;
      streamH = settings.height || 1080;
      supportsPOI = 'pointsOfInterest' in caps;

      if (caps.zoom && typeof caps.zoom.max === 'number') {
        zoomCaps = caps.zoom;  // used as a quality supplement — see canvas draw loop
      }
      // Always canvas mode: canvas is the display layer, video stays hidden as data source.
      // Native zoom (when available) pre-zooms the stream up to its hardware cap;
      // the canvas crops any remaining factor. This gives the full stream-resolution
      // zoom range regardless of the native cap, with better quality at low zoom levels.
      zoomMode = 'canvas';
      const vw = Math.max(viewfinder.clientWidth,  1);
      const vh = Math.max(viewfinder.clientHeight, 1);
      const resBound = Math.min(streamW / vw, streamH / vh);
      maxZoom = Math.max(1, Math.min(6, resBound));
      if (!cameraStarted) startCanvasLoop();
      cameraStarted = true;

      zoomLevels = DEFAULT_LEVELS.filter(v => v <= maxZoom + 0.001);
      if (zoomLevels.length === 0 || zoomLevels[zoomLevels.length - 1] < maxZoom - 0.05) {
        zoomLevels.push(Math.round(maxZoom * 10) / 10);
      }

      state.zoom = clamp(state.zoom, 1, maxZoom);
      render();
    })
    .catch(() => { noCamera.style.display = 'flex'; });
  };

  window.requestCamera();

  function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }
  function fmtZoom(z) { return (Math.round(z * 10) / 10) + '×'; }

  function startCanvasLoop() {
    viewfinder.classList.add('canvas-tier');
    const dpr = window.devicePixelRatio || 1;
    function resize() {
      const w = viewfinder.clientWidth  || window.innerWidth;
      const h = viewfinder.clientHeight || (window.innerHeight - 72);
      canvas.width  = w * dpr;
      canvas.height = h * dpr;
    }
    resize();
    // ResizeObserver fires reliably on viewport rotation in Capacitor WebViews;
    // window 'resize' is the fallback for browsers that lack it.
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(resize).observe(viewfinder);
    } else {
      window.addEventListener('resize', resize);
    }

    function draw() {
      if (!frozen && video.readyState >= 2 && streamW && streamH) {
        const cw = canvas.width, ch = canvas.height;
        const tA = cw / ch, sA = streamW / streamH;
        let sw, sh;
        if (sA > tA) { sh = streamH;             sw = sh * tA; }
        else         { sw = streamW;             sh = sw / tA; }
        // Native zoom pre-zooms up to its hardware cap; canvas crops the rest.
        // cropFactor = 1 when zoom ≤ nativeCap (canvas is lossless, native handles it all).
        // cropFactor > 1 when zoom > nativeCap (canvas crops from the already-zoomed stream).
        const nativeZ = zoomCaps ? clamp(state.zoom, zoomCaps.min, zoomCaps.max) : 1;
        sw /= (state.zoom / nativeZ);
        sh /= (state.zoom / nativeZ);
        const sx = (streamW - sw) / 2;
        const sy = (streamH - sh) / 2;
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cw, ch);
      }
      schedule();
    }
    function schedule() {
      if (typeof video.requestVideoFrameCallback === 'function') {
        video.requestVideoFrameCallback(draw);
      } else {
        requestAnimationFrame(draw);
      }
    }
    schedule();
  }

  function applyNativeZoom() {
    if (!track || !zoomCaps) return;
    const z = clamp(state.zoom, zoomCaps.min, zoomCaps.max);
    track.applyConstraints({ advanced: [{ zoom: z }] }).catch(() => {});
  }

  function render() {
    const m = MODES[state.modeIndex];
    const b = BRIGHT[state.brightIndex];

    let base;
    if (m.naturalColor) base = '';
    else base = m.invert ? 'invert(1) grayscale(1) brightness(1.1)' : 'grayscale(1) brightness(0.8)';
    const filterValue = base ? `${base} contrast(${b.cont})` : `contrast(${b.cont})`;

    if (zoomMode === 'canvas') {
      canvas.style.filter = filterValue;
      video.style.filter = '';
      if (zoomCaps) applyNativeZoom();  // pre-zoom the stream for quality
    }
    // else: camera not yet started — nothing to filter yet

    tintOverlay.style.background = m.tint;

    modeLabel.textContent   = m.name;
    zoomLabel.textContent   = fmtZoom(state.zoom);
    brightLabel.textContent = b.cont + '×';

    modeCircle.setAttribute('fill',   m.iconFill);
    modeCircle.setAttribute('stroke', m.iconStroke);

    save();
  }

  window.nextMode   = () => { state.modeIndex   = (state.modeIndex   + 1) % MODES.length;  render(); };
  window.nextBright = () => { state.brightIndex = (state.brightIndex + 1) % BRIGHT.length; render(); };
  window.cycleZoom  = () => {
    const next = zoomLevels.find(v => v > state.zoom + 0.001);
    state.zoom = (next != null) ? next : zoomLevels[0];
    render();
  };

  // ── Pinch-to-zoom + tap-to-focus ─────────────────────────────
  let pinching = false;
  let pinchStartDist = 0;
  let pinchStartZoom = 1;
  let tapStart = null;

  function dist(a, b) {
    return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  }

  viewfinder.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      pinching = true;
      pinchStartDist = dist(e.touches[0], e.touches[1]);
      pinchStartZoom = state.zoom;
      tapStart = null;
      e.preventDefault();
    } else if (e.touches.length === 1 && !pinching) {
      const t = e.touches[0];
      tapStart = { x: t.clientX, y: t.clientY, time: Date.now() };
    }
  }, { passive: false });

  viewfinder.addEventListener('touchmove', (e) => {
    if (pinching && e.touches.length === 2) {
      const d = dist(e.touches[0], e.touches[1]);
      const ratio = d / (pinchStartDist || d);
      state.zoom = clamp(pinchStartZoom * ratio, 1, maxZoom);
      render();
      e.preventDefault();
    }
  }, { passive: false });

  viewfinder.addEventListener('touchend', (e) => {
    if (e.touches.length < 2 && pinching) {
      pinching = false;
      tapStart = null;
      return;
    }
    if (e.touches.length === 0 && tapStart && supportsPOI && track) {
      const t = e.changedTouches[0];
      const dt = Date.now() - tapStart.time;
      const dx = Math.abs(t.clientX - tapStart.x);
      const dy = Math.abs(t.clientY - tapStart.y);
      if (dt < 500 && dx < 10 && dy < 10) {
        const rect = viewfinder.getBoundingClientRect();
        const x = clamp((t.clientX - rect.left) / rect.width,  0, 1);
        const y = clamp((t.clientY - rect.top)  / rect.height, 0, 1);
        track.applyConstraints({
          advanced: [{ pointsOfInterest: [{ x, y }], focusMode: 'single-shot' }],
        }).catch(() => {});
        if (focusRevertTimer) clearTimeout(focusRevertTimer);
        focusRevertTimer = setTimeout(() => {
          track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
        }, 2000);
      }
    }
    tapStart = null;
  });

  render();

  // ── Native-only features (torch + freeze) ────────────────────
  const isNative = typeof window.Capacitor !== 'undefined' && window.Capacitor.isNativePlatform();

  if (isNative) {
    document.getElementById('torch-btn').style.display  = 'flex';
    document.getElementById('freeze-btn').style.display = 'flex';
    document.getElementById('btn-bar').classList.add('compact');
  }

  let torchOn = false;
  window.toggleTorch = async () => {
    if (!isNative) return;
    const nextState = !torchOn;
    let success = false;

    // Primary: use the live camera track's torch constraint.
    // This works while the camera is open (no CameraAccessException conflict).
    if (track) {
      try {
        await track.applyConstraints({ advanced: [{ torch: nextState }] });
        success = true;
      } catch (_) {}
    }

    // Fallback: Capacitor plugin (e.g. torch-only devices or when track unavailable)
    if (!success) {
      try {
        const Torch = window.Capacitor?.Plugins?.Torch;
        if (Torch) {
          nextState ? await Torch.enable() : await Torch.disable();
          success = true;
        }
      } catch (_) {}
    }

    if (success) {
      torchOn = nextState;
      document.getElementById('torch-label').textContent = torchOn ? 'Light On' : 'Light';
      document.getElementById('torch-btn').style.background = torchOn ? '#222' : '';
    }
  };

  // ── Page-visibility: release camera when backgrounded (web only) ──
  // On native the OS suspends the WebView and handles this automatically.
  // On web this frees the camera indicator light when the user switches tabs.
  if (!isNative) {
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (track) { try { track.stop(); } catch (_) {} track = null; }
        if (video.srcObject) {
          try { video.srcObject.getTracks().forEach(t => t.stop()); } catch (_) {}
          video.srcObject = null;
          video.style.opacity = '0';
        }
      } else {
        window.requestCamera();  // restart when tab becomes visible again
      }
    });
  }

  // ── Orientation-aware button rotation ───────────────────────
  // screen.orientation.angle reflects physical device rotation even when the
  // OS rotation lock is ON — because we're reading the sensor/API directly,
  // not waiting for the viewport to change. Buttons stay at the bottom;
  // only their inner content rotates so it's readable when held sideways.
  function applyOrientation() {
    const angle =
      (typeof screen.orientation !== 'undefined' ? screen.orientation.angle : null) ??
      (typeof window.orientation !== 'undefined' ? window.orientation      : 0);
    const a = ((angle % 360) + 360) % 360;  // normalise to 0–359

    // Only rotate button content when the device is physically sideways BUT the
    // viewport hasn't actually rotated (i.e. OS rotation lock is ON).
    // When lock is OFF the viewport rotates itself, so button content is already
    // upright — adding a CSS rotation here would double-rotate it.
    const viewportIsLandscape = window.innerWidth > window.innerHeight;
    const deviceIsLandscape   = (a === 90 || a === 270);

    document.body.classList.remove('orient-cw', 'orient-ccw');
    if (deviceIsLandscape && !viewportIsLandscape) {
      if (a === 90)  document.body.classList.add('orient-ccw'); // phone tilted CCW
      if (a === 270) document.body.classList.add('orient-cw');  // phone tilted CW
    }
  }
  if (typeof screen.orientation !== 'undefined') {
    screen.orientation.addEventListener('change', applyOrientation);
  }
  window.addEventListener('orientationchange', applyOrientation);
  window.addEventListener('resize', applyOrientation); // catches viewport reflow after rotation
  applyOrientation();

  // Freeze frame: stop the canvas draw loop so users can read steady text.
  // The video stream keeps running; `frozen` simply stops drawImage() each frame.
  window.freezeFrame = () => {
    frozen = !frozen;
    if (frozen) {
      document.getElementById('freeze-label').textContent = 'Resume';
      document.getElementById('freeze-icon').innerHTML =
        '<polygon points="6,4 6,20 20,12" />';
      document.getElementById('freeze-btn').style.background = '#222';
    } else {
      document.getElementById('freeze-label').textContent = 'Freeze';
      document.getElementById('freeze-icon').innerHTML =
        '<rect x="6" y="4" width="4" height="16" rx="0.5"/><rect x="14" y="4" width="4" height="16" rx="0.5"/>';
      document.getElementById('freeze-btn').style.background = '';
    }
  };

}());
</script>
</body>
</html>
